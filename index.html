<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Refund</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0d0d0d;
    color: #fff;
}

.container {
    max-width: 600px;
    margin: 30px auto;
    background: #1a1a1a;
    padding: 25px;
    border-radius: 10px;
    border: 2px solid orange;
}

h1 {
    text-align: center;
    color: orange;
    font-size: 20px;
}

label {
    display: block;
    margin-top: 12px;
    font-size: 14px;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 6px;
    border: none;
}

.statement {
    margin-top: 15px;
    font-size: 13px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background: gray;
    border: none;
    color: #fff;
    font-size: 16px;
    border-radius: 8px;
    cursor: not-allowed;
}

button.active {
    background: orange;
    cursor: pointer;
}

/* Loading overlay */
.loading {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 999;
}

.spinner {
    border: 5px solid #333;
    border-top: 5px solid orange;
    border-radius: 50%;
    width: 50px;
    height: 50px;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="container">
<h1>Silahkan Lengkapi Data Diri Beserta Bukti Pembayaran</h1>

<form id="refundForm">

<label>Nama Lengkap</label>
<input type="text" required>

<label>NIK</label>
<input type="number" required>

<label>E-mail</label>
<input type="email" required>

<label>No. Handphone</label>
<input type="number" required>

<label>Alamat Lengkap</label>
<textarea required></textarea>

<label>Tanggal Pembelian</label>
<input type="date" required>

<label>Upload Foto KTP</label>
<input type="file" accept="image/*" required>

<label>Upload Bukti Pembayaran</label>
<input type="file" accept="image/*" required>

<div class="statement">
<input type="checkbox" id="agree">
Saya menyatakan bahwa data-data di atas benar dan dapat dipertanggungjawabkan.
</div>

<button type="submit" id="btn" disabled>Kirim Data Refund</button>

</form>
</div>

<!-- Loading -->
<div class="loading" id="loading">
    <div class="spinner"></div>
    <p style="margin-top:15px;">Memproses... Mohon tunggu</p>
</div>

<script>
const agree = document.getElementById("agree");
const btn = document.getElementById("btn");
const form = document.getElementById("refundForm");
const loading = document.getElementById("loading");

// tombol aktif
agree.addEventListener("change", function(){
    if(this.checked){
        btn.disabled = false;
        btn.classList.add("active");
    } else {
        btn.disabled = true;
        btn.classList.remove("active");
    }
});

// saat submit
form.addEventListener("submit", function(e){
    e.preventDefault(); // stop kirim data

    loading.style.display = "flex";

    setTimeout(function(){
        window.location.href = "https://soekarnofestrun2026-rgb.github.io/QR-Pengembalian-/";
    }, 3000);
});
</script>

</body>
</html>
